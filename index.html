<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro GitHub Previewer</title>
    <style>
        body { font: 14px sans-serif; background: #f6f8fa; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #ui-container { padding: 20px; flex-shrink: 0; background: white; border-bottom: 2px solid #ddd; }
        #preview-frame { flex-grow: 1; border: none; width: 100%; display: none; background: white; }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: center; }
        input[type="url"] { padding: 10px; width: 400px; border: 1px solid #ddd; border-radius: 4px; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #2ea44f; color: white; }
        .btn-blue { background: #0969da; color: white; }
        .btn-red { background: #cf222e; color: white; }
        
        #history-list { margin-top: 15px; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .history-tag { background: #eee; padding: 5px 10px; border-radius: 15px; white-space: nowrap; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="controls">
        <input type="url" id="file" placeholder="Paste GitHub HTML URL...">
        <button class="btn btn-green" onclick="launchPreview()">Preview</button>
        <button class="btn btn-blue" onclick="exportJSON()">Export</button>
        <button class="btn btn-blue" onclick="document.getElementById('importFile').click()">Import</button>
        <button class="btn btn-red" onclick="clearHistory()">Clear</button>
        <input type="file" id="importFile" style="display:none" onchange="importJSON(this)">
    </div>
    <div id="history-list"></div>
</div>

<iframe id="preview-frame"></iframe>

<script src="preview.js"></script>
</body>
</html>
