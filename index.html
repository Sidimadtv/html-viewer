<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GitHub Preview Pro</title>
    <style>
        body { font: 14px sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        #dashboard { background: #fff; padding: 15px; border-bottom: 2px solid #ddd; flex-shrink: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        input[type="url"] { padding: 10px; width: 50%; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-go { background: #2ea44f; color: white; }
        .btn-tool { background: #0969da; color: white; }
        .btn-clear { background: #cf222e; color: white; }
        #history { margin-top: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .tag { background: #e1e4e8; padding: 4px 10px; border-radius: 12px; font-size: 12px; cursor: pointer; }
        /* The Iframe is the key - it prevents the 'ruining' */
        #viewer { flex-grow: 1; border: none; width: 100%; background: white; }
    </style>
</head>
<body>

<div id="dashboard">
    <div class="controls">
        <input type="url" id="gh-url" placeholder="https://github.com/user/repo/blob/main/index.html">
        <button class="btn btn-go" onclick="runPreview()">Preview</button>
        <button class="btn btn-tool" onclick="exportHistory()">Export JSON</button>
        <button class="btn btn-tool" onclick="document.getElementById('importFile').click()">Import JSON</button>
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <input type="file" id="importFile" style="display:none" onchange="importHistory(this)">
    </div>
    <div id="history"></div>
</div>

<iframe id="viewer"></iframe>

<script src="preview.js"></script>
</body>
</html>
