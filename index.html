<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GitHub Repo Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0969da; --border: #d0d7de; --bg: #f6f8fa; }
        body { font: 14px -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Header & Input */
        .header { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); text-align: center; margin-bottom: 30px; }
        .input-group { position: relative; max-width: 700px; margin: 20px auto; display: flex; gap: 10px; }
        .search-container { position: relative; flex-grow: 1; }
        
        input[type="url"] { width: 100%; padding: 12px 45px 12px 15px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        /* Fixed Clear Button */
        #clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #afb8c1; font-size: 18px; border: none; background: none; display: none; }
        #clear-btn:hover { color: #cf222e; }

        .btn { padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .btn-preview { background: #1a7f37; color: white; border: none; }
        
        /* Grid Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-header { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #24292f; margin-bottom: 8px; }
        .card-url { color: var(--primary); font-size: 13px; text-decoration: none; word-break: break-all; margin-bottom: 15px; display: block; height: 36px; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f0f2f5; padding-top: 15px; }
        
        .icon-btn { color: #57606a; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; background: none; border: none; }
        .icon-btn:hover { color: var(--primary); }
        #viewer { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fab fa-github"></i> Repository Previewer</h1>
        <div class="input-group">
            <div class="search-container">
                <input type="url" id="gh-url" placeholder="Paste GitHub HTML URL..." oninput="toggleX()">
                <button id="clear-btn" onclick="clearTextbox()"><i class="fas fa-times-circle"></i></button>
            </div>
            <button class="btn btn-preview" onclick="runPreview()">Preview</button>
        </div>
        <div>
            <button class="btn" onclick="exportHistory()"><i class="fas fa-file-export"></i> Export</button>
            <button class="btn" onclick="document.getElementById('importFile').click()"><i class="fas fa-file-import"></i> Import</button>
            <button class="btn" onclick="clearAll()" style="color:#cf222e"><i class="fas fa-trash-alt"></i> Clear All</button>
            <input type="file" id="importFile" style="display:none" onchange="importHistory(this)">
        </div>
    </div>

    <div id="history" class="grid"></div>
</div>

<iframe id="viewer"></iframe>

<script src="preview.js"></script>
</body>
</html>
